name: Weekly Audit
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9 AM UTC
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scraper Tools
        run: |
          pip install playwright pandas
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Save Data to Repo
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          git add database.csv
          git commit -m "Automated audit update $(date)" || exit 0
          git push
