name: Weekly Audit
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node warning
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Note: v4 is actually stable for Node 24

      - name: Set up Python
        uses: actions/setup-python@v5 

      - name: Install Scraper Tools
        run: |
          pip install playwright pandas
          playwright install chromium --with-deps # Added dependencies for Ubuntu

      - name: Run Scraper
        run: python scraper.py

      - name: Save Data to Repo
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          git add database.csv
          git commit -m "Automated audit update $(date)" || exit 0
          git push
