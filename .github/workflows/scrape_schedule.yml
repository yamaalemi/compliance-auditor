name: Weekly Audit
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scraper Tools
        run: |
          pip install playwright pandas
          playwright install chromium --with-deps

      - name: Run Scraper
        run: python scraper.py || echo "Scraper had an issue but continuing..."

      - name: 🔥 SHOW RESULTS 🔥
        run: |
          if [ -f database.csv ]; then
            cat database.csv
          else
            echo "No database.csv found."
          fi
